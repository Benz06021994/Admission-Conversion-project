{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="main-card">
    <h1>Live Prediction Dashboard</h1>
    <p class="subtitle">View prediction trends over time</p>

    <div class="dashboard-filters">
        <select id="monthSelect">
            <option value="">Select Month</option>
            <option value="01">January</option>
            <option value="02">February</option>
            <option value="03">March</option>
            <option value="04">April</option>
            <option value="05">May</option>
            <option value="06">June</option>
            <option value="07">July</option>
            <option value="08">August</option>
            <option value="09">September</option>
            <option value="10">October</option>
            <option value="11">November</option>
            <option value="12">December</option>
        </select>

        <select id="quarterSelect">
            <option value="">Select Quarter</option>
            <option value="Q1">Q1</option>
            <option value="Q2">Q2</option>
            <option value="Q3">Q3</option>
            <option value="Q4">Q4</option>
        </select>

        <select id="halfSelect">
            <option value="">Select Half Year</option>
            <option value="H1">H1</option>
            <option value="H2">H2</option>
        </select>

        <select id="yearSelect">
            <option value="">Select Year</option>
            {% for year in years %}
            <option value="{{ year }}">{{ year }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="chart-grid">
        <div class="chart-card">
            <h3>Lead Count</h3>
            <canvas id="leadChart"></canvas>
        </div>

        <div class="chart-card">
            <h3>Average Conversion Probability</h3>
            <canvas id="probChart"></canvas>
        </div>

        <div class="chart-card">
            <h3>Average Score</h3>
            <canvas id="scoreChart"></canvas>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let leadChart, probChart, scoreChart;

async function loadData(period, value) {
    const res = await fetch(`/dashboard-data?period=${period}&value=${encodeURIComponent(value || "")}`);
    const data = await res.json();

    if (leadChart) leadChart.destroy();
    if (probChart) probChart.destroy();
    if (scoreChart) scoreChart.destroy();

    leadChart = new Chart(document.getElementById("leadChart"), {
        type: "bar",
        data: {
            labels: data.labels,
            datasets: [{
                label: "Lead Count",
                data: data.lead_counts
            }]
        }
    });

    probChart = new Chart(document.getElementById("probChart"), {
        type: "line",
        data: {
            labels: data.labels,
            datasets: [{
                label: "Probability %",
                data: data.avg_probability
            }]
        }
    });

    scoreChart = new Chart(document.getElementById("scoreChart"), {
        type: "line",
        data: {
            labels: data.labels,
            datasets: [{
                label: "Score",
                data: data.avg_score
            }]
        }
    });
}

function clearOtherFilters(activeId) {
    const ids = ["monthSelect", "quarterSelect", "halfSelect"];
    ids.forEach(id => {
        if (id !== activeId) {
            document.getElementById(id).value = "";
        }
    });
}

function getSelectedYear() {
    return document.getElementById("yearSelect").value;
}

document.getElementById("monthSelect").addEventListener("change", function () {
    clearOtherFilters("monthSelect");
    const year = getSelectedYear();
    const month = this.value;

    if (!month) {
        loadData("yearly", year || "");
        return;
    }

    if (!year) {
        alert("Please select a year first.");
        this.value = "";
        return;
    }

    loadData("monthly", `${year}-${month}`);
});

document.getElementById("quarterSelect").addEventListener("change", function () {
    clearOtherFilters("quarterSelect");
    const year = getSelectedYear();
    const quarter = this.value;

    if (!quarter) {
        loadData("yearly", year || "");
        return;
    }

    if (!year) {
        alert("Please select a year first.");
        this.value = "";
        return;
    }

    loadData("quarterly", `${year}-${quarter}`);
});

document.getElementById("halfSelect").addEventListener("change", function () {
    clearOtherFilters("halfSelect");
    const year = getSelectedYear();
    const half = this.value;

    if (!half) {
        loadData("yearly", year || "");
        return;
    }

    if (!year) {
        alert("Please select a year first.");
        this.value = "";
        return;
    }

    loadData("halfyearly", `${year}-${half}`);
});

document.getElementById("yearSelect").addEventListener("change", function () {
    const selectedYear = this.value;
    const month = document.getElementById("monthSelect").value;
    const quarter = document.getElementById("quarterSelect").value;
    const half = document.getElementById("halfSelect").value;

    if (month) {
        loadData("monthly", `${selectedYear}-${month}`);
    } else if (quarter) {
        loadData("quarterly", `${selectedYear}-${quarter}`);
    } else if (half) {
        loadData("halfyearly", `${selectedYear}-${half}`);
    } else {
        loadData("yearly", selectedYear);
    }
});

window.addEventListener("load", function () {
    const yearSelect = document.getElementById("yearSelect");
    const currentYear = new Date().getFullYear().toString();

    if ([...yearSelect.options].some(option => option.value === currentYear)) {
        yearSelect.value = currentYear;
        loadData("yearly", currentYear);
    } else {
        loadData("yearly", "");
    }
});
</script>
{% endblock %}
