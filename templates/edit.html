{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Edit Lead</h2>

<form method="POST">

<label>Contact Owner</label>
<select name="Contact Owner" required>
{% for owner in contact_owners %}
<option value="{{ owner }}" {% if row["contact_owner"] == owner %}selected{% endif %}>
{{ owner }}
</option>
{% endfor %}
</select>


<label>Track Interested</label>
<select name="Track Interested" required>
{% for track in track_interested_list %}
<option value="{{ track }}" {% if row["track_interested"] == track %}selected{% endif %}>
{{ track }}
</option>
{% endfor %}
</select>


<label>District</label>
<select name="District" required>
{% for d in districts %}
<option value="{{ d }}" {% if row["district"] == d %}selected{% endif %}>
{{ d }}
</option>
{% endfor %}
</select>


<label>Source of Lead</label>
<select name="Source of lead" required>
{% for s in source_of_lead_list %}
<option value="{{ s }}" {% if row["source_of_lead"] == s %}selected{% endif %}>
{{ s }}
</option>
{% endfor %}
</select>


<label>Course</label>
<select name="Course" required>
{% for c in courses %}
<option value="{{ c }}" {% if row["course"] == c %}selected{% endif %}>
{{ c }}
</option>
{% endfor %}
</select>


<label>Specialization</label>
<select name="Specialization" required>
{% for sp in specializations %}
<option value="{{ sp }}" {% if row["specialization"] == sp %}selected{% endif %}>
{{ sp }}
</option>
{% endfor %}
</select>


<label>Gender</label>
<select name="Gender" required>
{% for g in genders %}
<option value="{{ g }}" {% if row["gender"] == g %}selected{% endif %}>
{{ g }}
</option>
{% endfor %}
</select>


<br><br>

<button type="submit">Update</button>

</form>

</div>

{% endblock %}
